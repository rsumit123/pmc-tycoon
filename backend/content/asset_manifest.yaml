# Hand-curated Wikimedia Commons hero-image URLs for platform dossiers.
# Fetcher: scripts/fetch_platform_assets.py. Results land in
# frontend/public/platforms/{id}/hero.jpg + attribution.json.
#
# Every entry was license-verified on its Commons File: page (CC-BY / CC-BY-SA /
# CC0 / Public domain / GODL-India). hero_url uses the Special:FilePath form,
# which redirects to the current full-res file and survives thumb-cache churn.
